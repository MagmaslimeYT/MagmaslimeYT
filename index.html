<!DOCTYPE html>
<html>
<head>
  <title>Miles Achievements</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      color: orange;
      margin-top: 20px;
    }

    .achievement {
      border: 2px solid #333;
      margin: 15px auto;
      padding: 15px;
      border-radius: 12px;
      background: #1a1a1a;
      width: 300px;
      transition: 0.2s;
      cursor: pointer;
      position: relative;
    }

    .achievement:hover {
      transform: scale(1.03);
      border-color: orange;
    }

    .locked {
      opacity: 0.4;
    }

    .unlocked {
      border-color: lime;
      box-shadow: 0 0 10px lime;
    }

    .timer {
      font-size: 0.9em;
      margin-top: 5px;
      color: yellow;
    }

    #popup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: black;
      border: 2px solid lime;
      padding: 15px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 15px lime;
      font-weight: bold;
      z-index: 1000;
    }
  </style>
</head>
<body>

<h1>🔥 Miles Achievement System 🔥</h1>

<div class="achievement locked">
  <h2>🟢 Fresh Air</h2>
  <p>Go outside for 5 minutes</p>
</div>

<div class="achievement locked">
  <h2>🔵 Human Behavior</h2>
  <p>No games for 1 hour</p>
</div>

<div class="achievement locked">
  <h2>🟣 Rehabilitation Arc</h2>
  <p>No games for 6 hours</p>
</div>

<div class="achievement locked">
  <h2>🟠 New Person??</h2>
  <p>No games for 12 hours</p>
</div>

<div class="achievement locked" id="touchGrass">
  <h2>🔴 Touch Grass</h2>
  <p>No games for 24 hours</p>
  <div class="timer" id="touchGrassTimer"></div>
</div>

<div id="popup">🏆 Achievement Unlocked!</div>

<script>
const achievements = document.querySelectorAll('.achievement');
const popup = document.getElementById("popup");

let saved = JSON.parse(localStorage.getItem("achievements")) || [];
let timers = JSON.parse(localStorage.getItem("timers")) || {};

achievements.forEach((a, index) => {
  if (saved.includes(index)) {
    a.classList.remove('locked');
    a.classList.add('unlocked');
  }
});

achievements.forEach((a, index) => {
  a.addEventListener('click', () => {
    if (a.id === "touchGrass") {
      if (!timers.touchGrass) {
        timers.touchGrass = { 
          start: Date.now(), 
          duration: 24*60*60*1000,
          pauseAccumulator: 0,
          lastVisibilityState: document.hidden ? "hidden" : "visible",
          lastCheckTime: Date.now()
        };
        localStorage.setItem("timers", JSON.stringify(timers));
        updateTimer();
        showPopup("⏳ Timer started!");
      }
    } else {
      if (a.classList.contains('locked')) {
        a.classList.remove('locked');
        a.classList.add('unlocked');
        if (!saved.includes(index)) saved.push(index);
        localStorage.setItem("achievements", JSON.stringify(saved));
        showPopup("🏆 " + a.innerText.split("\n")[0] + " unlocked!");
      } else {
        a.classList.remove('unlocked');
        a.classList.add('locked');
        saved = saved.filter(i => i !== index);
        localStorage.setItem("achievements", JSON.stringify(saved));
        showPopup("⚠️ " + a.innerText.split("\n")[0] + " locked!");
      }
    }
  });
});

function showPopup(text) {
  popup.style.display = "block";
  popup.innerText = text;
  setTimeout(() => { popup.style.display = "none"; }, 2000);
}

function updateTimer() {
  const tg = document.getElementById("touchGrass");
  const timerEl = document.getElementById("touchGrassTimer");
  if (!timers.touchGrass) return;

  if (timers.touchGrass.pauseAccumulator === undefined) {
    timers.touchGrass.pauseAccumulator = 0;
    timers.touchGrass.lastVisibilityState = document.hidden ? "hidden" : "visible";
    timers.touchGrass.lastCheckTime = Date.now();
    localStorage.setItem("timers", JSON.stringify(timers));
  }
  
  const now = Date.now();
  const currentState = document.hidden ? "hidden" : "visible";
  const lastState = timers.touchGrass.lastVisibilityState;
  const lastTime = timers.touchGrass.lastCheckTime || now;
  
  if (lastState === "visible") {
    const elapsedVisible = now - lastTime;
    if (elapsedVisible > 0) {
      timers.touchGrass.pauseAccumulator += elapsedVisible;
    }
  }
  
  timers.touchGrass.lastVisibilityState = currentState;
  timers.touchGrass.lastCheckTime = now;
  
  const realElapsed = now - timers.touchGrass.start;
  const effectiveElapsed = Math.max(0, realElapsed - timers.touchGrass.pauseAccumulator);
  const remaining = timers.touchGrass.duration - effectiveElapsed;
  
  if (remaining <= 0) {
    tg.classList.remove('locked');
    tg.classList.add('unlocked');
    const tgIndex = Array.from(achievements).indexOf(tg);
    if (!saved.includes(tgIndex)) {
      saved.push(tgIndex);
    }
    localStorage.setItem("achievements", JSON.stringify(saved));
    delete timers.touchGrass;
    localStorage.setItem("timers", JSON.stringify(timers));
    timerEl.innerText = "";
    showPopup("🏆 Touch Grass unlocked!");
    return;
  }
  
  let h = Math.floor(remaining / (1000*60*60));
  let m = Math.floor((remaining % (1000*60*60)) / (1000*60));
  let s = Math.floor((remaining % (1000*60)) / 1000);
  timerEl.innerText = `⏱ ${h}h ${m}m ${s}s`;
  
  localStorage.setItem("timers", JSON.stringify(timers));
  
  setTimeout(updateTimer, 1000);
}

document.addEventListener("visibilitychange", () => {
  if (timers.touchGrass) {
    const now = Date.now();
    const lastTime = timers.touchGrass.lastCheckTime || now;
    const currentState = document.hidden ? "hidden" : "visible";
    const lastState = timers.touchGrass.lastVisibilityState;
    
    if (lastState === "visible") {
      const elapsedVisible = now - lastTime;
      if (elapsedVisible > 0) {
        timers.touchGrass.pauseAccumulator += elapsedVisible;
      }
    }
    
    timers.touchGrass.lastVisibilityState = currentState;
    timers.touchGrass.lastCheckTime = now;
    localStorage.setItem("timers", JSON.stringify(timers));
    
    updateTimer();
  }
});

window.addEventListener("focus", () => {
  if (timers.touchGrass) {
    const now = Date.now();
    const lastTime = timers.touchGrass.lastCheckTime || now;
    if (timers.touchGrass.lastVisibilityState === "visible") {
      const elapsedVisible = now - lastTime;
      if (elapsedVisible > 0) {
        timers.touchGrass.pauseAccumulator += elapsedVisible;
      }
    }
    timers.touchGrass.lastVisibilityState = "visible";
    timers.touchGrass.lastCheckTime = now;
    localStorage.setItem("timers", JSON.stringify(timers));
    updateTimer();
  }
});

window.addEventListener("blur", () => {
  if (timers.touchGrass) {
    const now = Date.now();
    const lastTime = timers.touchGrass.lastCheckTime || now;
    if (timers.touchGrass.lastVisibilityState === "visible") {
      const elapsedVisible = now - lastTime;
      if (elapsedVisible > 0) {
        timers.touchGrass.pauseAccumulator += elapsedVisible;
      }
    }
    timers.touchGrass.lastVisibilityState = "hidden";
    timers.touchGrass.lastCheckTime = now;
    localStorage.setItem("timers", JSON.stringify(timers));
    updateTimer();
  }
});

window.addEventListener("beforeunload", () => {
  if (timers.touchGrass) {
    const now = Date.now();
    const lastTime = timers.touchGrass.lastCheckTime || now;
    if (timers.touchGrass.lastVisibilityState === "visible") {
      const elapsedVisible = now - lastTime;
      if (elapsedVisible > 0) {
        timers.touchGrass.pauseAccumulator += elapsedVisible;
      }
    }
    timers.touchGrass.lastCheckTime = now;
    localStorage.setItem("timers", JSON.stringify(timers));
  }
});

if (timers.touchGrass) {
  if (timers.touchGrass.pauseAccumulator === undefined) {
    timers.touchGrass.pauseAccumulator = 0;
    timers.touchGrass.lastVisibilityState = document.hidden ? "hidden" : "visible";
    timers.touchGrass.lastCheckTime = Date.now();
    localStorage.setItem("timers", JSON.stringify(timers));
  }
  updateTimer();
}
</script>

</body>
</html>
