<!DOCTYPE html>
<html>
<head>
  <title>Miles Achievements</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: orange;
    }

    .achievement {
      border: 2px solid #333;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
      background: #1a1a1a;
      transition: 0.2s;
      cursor: pointer;
    }

    .achievement:hover {
      transform: scale(1.03);
      border-color: orange;
    }

    .locked {
      opacity: 0.4;
    }

    .unlocked {
      border-color: lime;
      box-shadow: 0 0 10px lime;
    }
  </style>
</head>
<body>

<h1>🔥 Miles Achievement System 🔥</h1>

<div class="achievement unlocked">
  <h2>🟢 Fresh Air</h2>
  <p>Go outside for 5 minutes</p>
</div>

<div class="achievement locked">
  <h2>🔵 Human Behavior</h2>
  <p>No games for 1 hour</p>
</div>

<div class="achievement locked">
  <h2>🟣 Rehabilitation Arc</h2>
  <p>No games for 6 hours</p>
</div>

<div class="achievement locked">
  <h2>🟠 New Person??</h2>
  <p>No games for 12 hours</p>
</div>

<div class="achievement locked">
  <h2>🔴 Touch Grass (Impossible)</h2>
  <p>No games for 24 hours</p>
</div>

<script>
  const achievements = document.querySelectorAll('.achievement');

  // Load saved achievements
  let saved = JSON.parse(localStorage.getItem("achievements")) || [];

  achievements.forEach((a, index) => {

    // Apply saved state
    if (saved.includes(index)) {
      a.classList.remove('locked');
      a.classList.add('unlocked');
    }

    // Click to unlock
    a.addEventListener('click', () => {
      a.classList.remove('locked');
      a.classList.add('unlocked');

      if (!saved.includes(index)) {
        saved.push(index);
        localStorage.setItem("achievements", JSON.stringify(saved));
      }
    });

  });
</script>

</body>
</html>
